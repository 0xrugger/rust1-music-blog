{% extends "base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <article class="post-page">
        <header class="post-page-header">
        <h1 class="post-page-title">{{ post.title }}</h1>
        
        <div class="post-page-body">
            {{ post.text }}
        </div>
        
        <div class="post-meta">
            <p>Slug: {{ post.slug }}</p>
        </div>
    </article>
{% endblock %}
